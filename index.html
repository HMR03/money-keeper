<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FF6B35">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>记账本</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#FF6B35;--primary-light:#FFF3ED;
  --green:#2ECC71;--green-light:#EDFCF2;
  --red:#E74C3C;
  --bg:#F5F5F5;--card:#FFFFFF;
  --text:#1A1A2E;--text2:#8E8E93;--text3:#C7C7CC;
  --border:#F0F0F0;
  --radius:14px;--radius-sm:10px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,"PingFang SC","Microsoft YaHei UI",sans-serif;background:var(--bg);color:var(--text)}
button{font:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,select{font:inherit;color:var(--text)}

/* App Shell */
#app{height:100%;display:flex;flex-direction:column}
.page{flex:1;overflow-y:auto;display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}
.page-pad{padding:16px 16px calc(70px + var(--safe-b))}

/* Tab Bar */
.tabbar{position:fixed;bottom:0;left:0;right:0;height:calc(56px + var(--safe-b));padding-bottom:var(--safe-b);background:var(--card);border-top:1px solid var(--border);display:flex;align-items:flex-start;z-index:100}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 4px;color:var(--text3);font-size:10px;gap:2px;transition:color .15s}
.tab-item.active{color:var(--primary)}
.tab-item .icon{font-size:22px;line-height:1}
.tab-add{flex:1;display:flex;justify-content:center;margin-top:-18px}
.tab-add-btn{width:50px;height:50px;border-radius:50%;background:var(--primary);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(255,107,53,.35);transition:transform .15s}
.tab-add-btn:active{transform:scale(.92)}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-shadow{box-shadow:0 1px 4px rgba(0,0,0,.04)}

/* ==================== 流水页 ==================== */
.month-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 0}
.month-nav button{width:32px;height:32px;border-radius:50%;background:var(--card);font-size:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.month-nav span{font-size:16px;font-weight:700;min-width:100px;text-align:center}
.summary-card{background:linear-gradient(135deg,#FF6B35,#FF8F65);border-radius:var(--radius);padding:20px;color:#fff;margin-bottom:16px}
.summary-amount{font-size:32px;font-weight:800;letter-spacing:-1px;margin:4px 0 8px;font-family:"DIN Alternate","Avenir Next",system-ui,sans-serif}
.summary-row{display:flex;gap:20px;font-size:13px;opacity:.85}
.summary-row span{display:flex;align-items:center;gap:4px}
.day-header{font-size:13px;color:var(--text2);font-weight:600;padding:8px 4px 6px;display:flex;justify-content:space-between}
.tx-item{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--card);border-radius:var(--radius-sm);margin-bottom:6px;transition:background .15s}
.tx-item:active{background:var(--border)}
.tx-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tx-icon.expense{background:var(--primary-light)}
.tx-icon.income{background:var(--green-light)}
.tx-info{flex:1;min-width:0}
.tx-cat{font-size:14px;font-weight:600}
.tx-note{font-size:11px;color:var(--text2);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-amount{font-size:16px;font-weight:700;font-family:"DIN Alternate","Avenir Next",system-ui;flex-shrink:0}
.tx-amount.expense{color:var(--primary)}
.tx-amount.income{color:var(--green)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;line-height:1.8}
.empty-state .icon{font-size:48px;margin-bottom:8px;opacity:.5}


/* ==================== 筛选栏 ==================== */
.filter-bar{margin-bottom:12px}
.filter-search{position:relative;margin-bottom:8px}
.filter-search input{width:100%;height:36px;border:none;border-radius:10px;background:var(--card);padding:0 12px 0 36px;font-size:13px;outline:none}
.filter-search input:focus{box-shadow:0 0 0 2px var(--primary)}
.filter-search .s-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3);pointer-events:none}
.filter-search .s-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text3);cursor:pointer;padding:2px 4px;display:none}
.tag-scroll{display:flex;gap:6px;overflow-x:auto;padding:2px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tag-scroll::-webkit-scrollbar{display:none}
.tag-pill{flex-shrink:0;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;background:var(--card);color:var(--text2);transition:all .15s;white-space:nowrap}
.tag-pill:active{transform:scale(.95)}
.tag-pill.active{background:var(--primary);color:#fff}
.filter-hint{font-size:11px;color:var(--text2);text-align:center;padding:4px 0;display:none}
.filter-hint.show{display:block}

/* ==================== 记一笔 ==================== */
.add-header{display:flex;align-items:center;padding:12px 16px}
.add-header .back{font-size:24px;color:var(--text2);padding:4px 8px}
.add-header .title{flex:1;text-align:center;font-size:16px;font-weight:700}
.type-toggle{display:flex;margin:0 16px 12px;background:var(--border);border-radius:8px;padding:3px}
.type-toggle button{flex:1;padding:8px;border-radius:6px;font-size:14px;font-weight:600;transition:all .2s}
.type-toggle .active-expense{background:var(--primary);color:#fff}
.type-toggle .active-income{background:var(--green);color:#fff}
.amount-display{text-align:right;padding:8px 20px 16px;font-size:42px;font-weight:800;font-family:"DIN Alternate","Avenir Next",system-ui;letter-spacing:-1px}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px;margin-bottom:12px;max-height:200px;overflow-y:auto}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:var(--radius-sm);font-size:11px;color:var(--text2);transition:all .15s}
.cat-btn .emoji{font-size:16px;font-weight:700;width:36px;height:36px;border-radius:8px;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center}
.cat-btn.selected{background:var(--primary-light);color:var(--primary)}
.cat-btn.selected.income-mode{background:var(--green-light);color:var(--green)}
.add-fields{padding:0 16px;margin-bottom:8px}
.add-field{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.add-field label{font-size:13px;color:var(--text2);width:50px;flex-shrink:0}
.add-field input{flex:1;border:none;outline:none;font-size:14px;background:none;height:36px}
.add-field input[type="date"]::-webkit-calendar-picker-indicator{width:28px;height:28px;cursor:pointer;opacity:.5}
#page-add{padding-bottom:calc(80px + var(--safe-b))}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin-bottom:calc(80px + var(--safe-b))}
.numpad button{background:var(--card);padding:14px;font-size:20px;font-weight:600;transition:background .1s}
.numpad button:active{background:#E8E8E8}
.numpad .save-btn{grid-column:span 2;background:var(--primary);color:#fff;padding:14px;font-size:16px}
.numpad .save-btn:active{background:#E55A2B}
.numpad .save-btn.income-mode{background:var(--green)}
.numpad .delete-btn{grid-column:span 1;background:var(--red);color:#fff;padding:14px;font-size:14px}
.numpad .delete-btn:active{background:#C0392B}

/* Image feature */
.img-btn{display:flex;align-items:center;gap:6px;color:var(--primary);font-size:13px;font-weight:600;cursor:pointer;padding:4px 0}
.img-btn .emoji{font-size:18px}
.img-thumb-preview{display:flex;align-items:center;gap:8px;margin-left:50px;margin-top:6px}
.img-thumb-preview img{width:48px;height:48px;border-radius:8px;object-fit:cover;border:1px solid var(--border)}
.img-thumb-preview .img-remove{font-size:12px;color:var(--red);cursor:pointer}
.tx-img-badge{font-size:11px;cursor:pointer;opacity:.6;flex-shrink:0;margin-left:4px}
.img-viewer{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.img-viewer.open{opacity:1;pointer-events:auto}
.img-viewer img{max-width:95vw;max-height:85vh;border-radius:8px;object-fit:contain}
.img-viewer .img-close{position:absolute;top:16px;right:16px;color:#fff;font-size:30px;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.15);border-radius:50%}
.csv-stats{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.csv-stat{flex:1;min-width:70px;padding:10px 8px;border-radius:var(--radius-sm);text-align:center}
.csv-stat .num{font-size:22px;font-weight:800;font-family:"DIN Alternate",system-ui}
.csv-stat .label{font-size:11px;color:var(--text2);margin-top:2px}
.csv-stat.exp{border:2px solid var(--primary);color:var(--primary)}
.csv-stat.inc{border:2px solid var(--green);color:var(--green)}
.csv-stat.skip{border:2px solid var(--text3);color:var(--text3)}

/* ==================== 报表页 ==================== */
.report-period{display:flex;justify-content:center;gap:8px;margin-bottom:16px}
.report-period button{padding:6px 18px;border-radius:20px;font-size:13px;font-weight:600;background:var(--card);color:var(--text2)}
.report-period button.active{background:var(--primary);color:#fff}
.chart-container{position:relative;height:220px;margin-bottom:8px}
.rank-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.rank-item:last-child{border-bottom:none}
.rank-num{font-size:12px;font-weight:700;color:var(--text3);width:18px;text-align:center}
.rank-icon{font-size:20px}
.rank-info{flex:1}
.rank-name{font-size:14px;font-weight:600}
.rank-bar{height:4px;background:var(--border);border-radius:2px;margin-top:4px}
.rank-bar-fill{height:100%;border-radius:2px;background:var(--primary);transition:width .3s}
.rank-right{text-align:right}
.rank-amount{font-size:14px;font-weight:700;font-family:"DIN Alternate",system-ui}
.rank-pct{font-size:11px;color:var(--text2)}

/* ==================== 设置页 ==================== */
.setting-group{margin-bottom:20px}
.setting-group-title{font-size:12px;color:var(--text2);font-weight:600;padding:0 4px 8px;text-transform:uppercase;letter-spacing:.5px}
.setting-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--card);border-bottom:1px solid var(--border);font-size:14px}
.setting-item:first-of-type{border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.setting-item:last-of-type{border-radius:0 0 var(--radius-sm) var(--radius-sm);border-bottom:none}
.setting-item:only-of-type{border-radius:var(--radius-sm)}
.setting-item .arrow{color:var(--text3);font-size:16px}
.setting-item.danger{color:var(--red)}

/* Edit Category Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:auto}
.modal-sheet{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:430px;max-height:70vh;padding:20px 16px calc(16px + var(--safe-b));transform:translateY(100%);transition:transform .3s}
.modal-bg.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--text3);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center}
.cat-edit-list{max-height:300px;overflow-y:auto}
.cat-edit-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.cat-edit-item .emoji{font-size:20px}
.cat-edit-item .name{flex:1;font-size:14px}
.cat-edit-item .del-btn{color:var(--red);font-size:18px;padding:4px 8px}
.cat-add-row{display:flex;gap:8px;margin-top:12px}
.cat-add-row input{flex:1;height:38px;border:1.5px solid var(--border);border-radius:8px;padding:0 12px;font-size:14px;outline:none}
.cat-add-row input:focus{border-color:var(--primary)}
.cat-add-row button{height:38px;padding:0 16px;background:var(--primary);color:#fff;border-radius:8px;font-size:13px;font-weight:600}
</style>
</head>
<body>
<div id="app">

  <!-- ==================== 流水页 ==================== -->
  <div id="page-tx" class="page active">
    <div class="page-pad">
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span id="monthLabel">2026年6月</span>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div class="summary-card">
        <div style="font-size:12px;opacity:.8">本月支出</div>
        <div class="summary-amount" id="sumExpense">0.00</div>
        <div class="summary-row">
          <span>收入 <b id="sumIncome">0.00</b></span>
          <span>结余 <b id="sumBalance">0.00</b></span>
        </div>
      </div>
      <!-- 筛选栏 -->
      <div class="filter-bar">
        <div class="filter-search">
          <span class="s-icon">🔍</span>
          <input type="text" id="filterInput" placeholder="搜索备注或分类..." oninput="onFilterInput()">
          <span class="s-clear" id="filterClear" onclick="clearFilter()">✕</span>
        </div>
        <div class="tag-scroll" id="tagScroll"></div>
      </div>
      <div class="filter-hint" id="filterHint"></div>
      <div id="txList"></div>
    </div>
  </div>

  <!-- ==================== 记一笔 ==================== -->
  <div id="page-add" class="page">
    <div class="add-header">
      <button class="back" onclick="closePage()">‹</button>
      <div class="title" id="addTitle">记一笔</div>
      <div style="width:40px"></div>
    </div>
    <div class="type-toggle">
      <button id="btnExpense" class="active-expense" onclick="setType('expense')">支出</button>
      <button id="btnIncome" onclick="setType('income')">收入</button>
    </div>
    <div class="amount-display" id="amountDisplay">0</div>
    <div class="cat-grid" id="catGrid"></div>
    <div class="add-fields">
      <div class="add-field">
        <label>备注</label>
        <input type="text" id="inputNote" placeholder="添加备注">
      </div>
      <div class="add-field">
        <label>日期</label>
        <input type="date" id="inputDate">
      </div>
      <div class="add-field">
        <label style="visibility:hidden">图片</label>
        <span class="img-btn" onclick="pickImage()">📷 拍照/选图</span>
      </div>
      <div class="img-thumb-preview" id="imgPreview" style="display:none">
        <img id="imgThumb" src="" alt="">
        <span class="img-remove" onclick="removeImage()">✕ 移除</span>
      </div>
    </div>
    <div class="numpad">
      <button onclick="numInput('1')">1</button>
      <button onclick="numInput('2')">2</button>
      <button onclick="numInput('3')">3</button>
      <button onclick="numInput('4')">4</button>
      <button onclick="numInput('5')">5</button>
      <button onclick="numInput('6')">6</button>
      <button onclick="numInput('7')">7</button>
      <button onclick="numInput('8')">8</button>
      <button onclick="numInput('9')">9</button>
      <button onclick="numInput('.')">.</button>
      <button onclick="numInput('0')">0</button>
      <button onclick="numInput('del')">⌫</button>
	      <button class="save-btn delete-btn" id="deleteBtn" onclick="deleteTx()" style="display:none">删除</button>
	      <button class="save-btn" id="saveBtn" onclick="saveTx()">保存</button>
    </div>
  </div>

  <!-- ==================== 报表页 ==================== -->
  <div id="page-report" class="page">
    <div class="page-pad">
      <h2 style="font-size:18px;font-weight:700;margin-bottom:16px">报表</h2>
      <div class="report-period">
        <button class="active" onclick="setReportPeriod('month',this)">月</button>
        <button onclick="setReportPeriod('year',this)">年</button>
      </div>
      <div class="card card-shadow">
        <div style="font-size:13px;font-weight:600;margin-bottom:8px">收支趋势</div>
        <div class="chart-container"><canvas id="trendChart"></canvas></div>
      </div>
      <div class="card card-shadow">
        <div style="font-size:13px;font-weight:600;margin-bottom:12px">支出分类排行</div>
        <div id="rankList"></div>
      </div>
    </div>
  </div>

  <!-- ==================== 设置页 ==================== -->
  <div id="page-settings" class="page">
    <div class="page-pad">
      <h2 style="font-size:18px;font-weight:700;margin-bottom:16px">设置</h2>
      <div class="setting-group">
        <div class="setting-group-title">分类管理</div>
        <div class="setting-item" onclick="openCatEditor('expense')">
          支出分类<span class="arrow">›</span>
        </div>
        <div class="setting-item" onclick="openCatEditor('income')">
          收入分类<span class="arrow">›</span>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-group-title">数据</div>
        <div class="setting-item" onclick="exportData()">
          导出数据<span class="arrow">›</span>
        </div>
        <div class="setting-item" onclick="importData()">
          导入数据<span class="arrow">›</span>
        </div>
        <div class="setting-item" onclick="importAlipayCSV()">
          导入支付宝 CSV<span class="arrow">›</span>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-item danger" onclick="clearAllData()">
          清除全部数据
        </div>
      </div>
      <div style="text-align:center;padding:20px;color:var(--text3);font-size:11px">
        记账本 v1.0 · 零广告 · 数据存在本地<br>
        长按主屏幕图标可卸载
      </div>
    </div>
  </div>

  <!-- Tab Bar -->
  <nav class="tabbar">
    <button class="tab-item active" onclick="showPage('tx',this)">
      <span class="icon">📋</span>流水
    </button>
    <button class="tab-item" onclick="showPage('report',this)">
      <span class="icon">📊</span>报表
    </button>
    <div class="tab-add">
      <button class="tab-add-btn" onclick="openAdd()">＋</button>
    </div>
    <button class="tab-item" onclick="showPage('settings',this)">
      <span class="icon">⚙️</span>设置
    </button>
    <button class="tab-item" style="visibility:hidden;width:0;flex:0"></button>
  </nav>
</div>

<!-- Category Editor Modal -->
<div class="modal-bg" id="catModal" onclick="if(event.target===this)closeCatEditor()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="catModalTitle">支出分类</div>
    <div class="cat-edit-list" id="catEditList"></div>
    <div class="cat-add-row">
      <input type="text" id="catNewName" placeholder="分类名称" style="flex:1">
      <button onclick="addNewCategory()">添加</button>
    </div>
  </div>
</div>

<input type="file" id="fileAlipay" accept=".csv" style="display:none" onchange="handleAlipayCSV(event)">
<!-- Hidden file input -->
<input type="file" id="fileImport" accept=".json" style="display:none" onchange="handleImport(event)">
<input type="file" id="fileImage" accept="image/*" capture="environment" style="display:none" onchange="handleImagePicked(event)">

<!-- Image Viewer -->
<div class="img-viewer" id="imgViewer" onclick="closeImageViewer()">
  <span class="img-close">✕</span>
  <img id="imgViewerImg" src="" alt="" onclick="event.stopPropagation()">
</div>

<!-- Alipay CSV Import Modal -->
<div class="modal-bg" id="csvModal" onclick="if(event.target===this)closeCsvModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">导入支付宝 CSV</div>
    <div style="text-align:center;margin-bottom:12px" id="csvSummary"></div>
    <div style="display:flex;gap:8px;margin-bottom:16px" id="csvStats"></div>
    <div style="font-size:12px;color:var(--text2);text-align:center;margin-bottom:12px">
      来源标记：支付宝 · 追加模式（不覆盖现有数据）
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="closeCsvModal()" style="flex:1;height:42px;border-radius:8px;background:var(--border);font-size:14px;font-weight:600">取消</button>
      <button onclick="doImportAlipay()" style="flex:1;height:42px;border-radius:8px;background:var(--primary);color:#fff;font-size:14px;font-weight:600">确认导入</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ==================== 默认分类 ====================
const DEFAULT_EXPENSE_CATS = [
  {name:'餐饮'},{name:'水果'},{name:'出行'},
  {name:'住房'},{name:'快递'},{name:'娱乐'},

// ==================== IndexedDB ====================
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('MoneyKeeper', 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('transactions')) {
        const store = db.createObjectStore('transactions', { keyPath: 'id' });
        store.createIndex('yearMonth', 'yearMonth');
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function dbAdd(tx) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const t = db.transaction('transactions', 'readwrite');
    t.objectStore('transactions').put(tx);
    t.oncomplete = () => resolve();
    t.onerror = e => reject(e.target.error);
  });
}

async function dbDelete(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const t = db.transaction('transactions', 'readwrite');
    t.objectStore('transactions').delete(id);
    t.oncomplete = () => resolve();
  });
}

async function dbGetByMonth(year, month) {
  const db = await openDB();
  const ym = `${year}-${String(month+1).padStart(2,'0')}`;
  return new Promise((resolve, reject) => {
    const t = db.transaction('transactions', 'readonly');
    const idx = t.objectStore('transactions').index('yearMonth');
    const req = idx.getAll(ym);
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = e => reject(e.target.error);
  });
}

async function dbGetAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const t = db.transaction('transactions', 'readonly');
    const req = t.objectStore('transactions').getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = e => reject(e.target.error);
  });
}

async function dbClear() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const t = db.transaction('transactions', 'readwrite');
    t.objectStore('transactions').clear();
    t.oncomplete = () => resolve();
  });
}

function getCats(type) {

  return type === 'expense' ? [...DEFAULT_EXPENSE_CATS] : [...DEFAULT_INCOME_CATS];
}
function saveCats(type, cats) {
  localStorage.setItem(`mk_cats_${type}`, JSON.stringify(cats));
}
function findCat(type, name) {
  return getCats(type).find(c => c.name === name) || { name };
}

function numInput(key) {
  if (key === 'del') {
    addAmount = addAmount.length > 1 ? addAmount.slice(0, -1) : '0';
  } else if (key === '.') {
    if (!addAmount.includes('.')) addAmount += '.';
  } else {
    if (addAmount === '0') addAmount = key;
    else addAmount += key;
  }
  // Limit decimal places
  if (addAmount.includes('.') && addAmount.split('.')[1]?.length > 2)
    addAmount = addAmount.slice(0, -1);
  // Limit length
  if (addAmount.replace('.','').length > 10)
    addAmount = addAmount.slice(0, -1);
  updateAmountDisplay();
}

async function renderTxList() {
  const y = currentMonth.getFullYear();
  const m = currentMonth.getMonth();
  document.getElementById('monthLabel').textContent = `${y}年${m + 1}月`;

  const allTxs = await dbGetByMonth(y, m);
  allTxs.sort((a, b) => b.date.localeCompare(a.date) || b.createdAt - a.createdAt);

  // 渲染分类标签栏（基于本月所有数据，不受筛选影响）
  const usedCats = [...new Set(allTxs.map(t => t.category))].filter(Boolean);
  const tagScroll = document.getElementById('tagScroll');
  if (usedCats.length > 0) {
    tagScroll.innerHTML = usedCats.map(cat =>
      `<button class="tag-pill ${filterCat===cat?'active':''}" onclick="toggleCatFilter('${cat}')">${cat}</button>`
    ).join('');
  } else {
    tagScroll.innerHTML = '';
  }

  // 应用筛选
  const txs = allTxs.filter(t => {
    if (filterCat && t.category !== filterCat) return false;
    if (filterQuery) {
      const q = filterQuery;
      if (!(t.category||'').toLowerCase().includes(q) && !(t.note||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  // 筛选提示
  const hint = document.getElementById('filterHint');
  const isFiltering = filterQuery || filterCat;
  if (isFiltering && allTxs.length > 0) {
    hint.textContent = `筛选结果：${txs.length} 条 / 共 ${allTxs.length} 条`;
    hint.className = 'filter-hint show';
  } else {
    hint.className = 'filter-hint';
  }

  // 汇总（基于筛选后的数据）
  let totalExpense = 0, totalIncome = 0;
  txs.forEach(t => {
    if (t.type === 'expense') totalExpense += t.amount;
    else totalIncome += t.amount;
  });

  document.getElementById('sumExpense').textContent = totalExpense.toFixed(2);
  document.getElementById('sumIncome').textContent = totalIncome.toFixed(2);
  document.getElementById('sumBalance').textContent = (totalIncome - totalExpense).toFixed(2);

  const container = document.getElementById('txList');
  if (!txs.length) {
    const msg = isFiltering ? '没有匹配的记录' : '这个月还没有记录<br>点击 ＋ 开始记账';
    container.innerHTML = '<div class="empty-state"><div class="icon">' + (isFiltering ? '🔍' : '📝') + '</div>' + msg + '</div>';
    return;
  }

  // Group by date
  const groups = {};
  txs.forEach(t => {
    if (!groups[t.date]) groups[t.date] = [];
    groups[t.date].push(t);
  });

  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  let html = '';
  for (const [date, items] of Object.entries(groups)) {
    const d = new Date(date);
    const dayTotal = items.reduce((s, t) => s + (t.type === 'expense' ? -t.amount : t.amount), 0);
    html += `<div class="day-header">
      <span>${d.getMonth()+1}月${d.getDate()}日 ${weekdays[d.getDay()]}</span>
      <span>${dayTotal >= 0 ? '+' : ''}${dayTotal.toFixed(2)}</span>
    </div>`;
    items.forEach(t => {
      const cat = findCat(t.type, t.category);
	      html += `<div class="tx-item" data-txid="${t.id}" onclick="openAdd('${t.id}')">
        <div class="tx-icon ${t.type}">${cat.name[0]}</div>
        <div class="tx-info">
          <div class="tx-cat">${t.category}</div>
          ${t.note ? `<div class="tx-note">${esc(t.note)}</div>` : ''}
        </div>
        <div class="tx-amount ${t.type}">${t.type==='expense'?'-':'+'} ${t.amount.toFixed(2)}</div>
	        <span class="tx-img-badge" id="imgBadge_${t.id}" style="display:none" onclick="event.stopPropagation();viewImage('${t.id}')">📷</span>
      </div>`;
    });
  }
  container.innerHTML = html;

	  // 异步检查哪些记录有图片
	  txs.forEach(async (t) => {
	    try {
	      const root = await navigator.storage.getDirectory();
	      const fh = await root.getFileHandle(`img_${t.id}.jpg`);
	      const badge = document.getElementById(`imgBadge_${t.id}`);
	      if (badge) badge.style.display = '';
	    } catch(e) { /* no image */ }
	  });
}

function setReportPeriod(p, btn) {

  btn.classList.add('active');

async function renderReport() {
  const all = await dbGetAll();
  const now = new Date();

  if (reportPeriod === 'month') {
    renderTrendChart(all, now);
    renderRankList(all, now.getFullYear(), now.getMonth());
  } else {
    renderTrendChart(all, now);
    renderRankList(all, now.getFullYear(), -1);
  }
}

function renderTrendChart(all, now) {
  const ctx = document.getElementById('trendChart');
  if (trendChart) trendChart.destroy();

  let labels = [], expData = [], incData = [];

  if (reportPeriod === 'month') {
    // Last 12 months
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      labels.push(`${d.getMonth()+1}月`);
      const monthTxs = all.filter(t => t.yearMonth === ym);
      expData.push(monthTxs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0));
      incData.push(monthTxs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0));
    }
  } else {
    // Last 5 years
    for (let i = 4; i >= 0; i--) {
      const y = now.getFullYear() - i;
      labels.push(`${y}`);
      const yearTxs = all.filter(t => t.date.startsWith(String(y)));
      expData.push(yearTxs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0));
      incData.push(yearTxs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0));
    }
  }

  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '支出', data: expData, borderColor: '#FF6B35', backgroundColor: 'rgba(255,107,53,.08)', fill: true, tension: .3, borderWidth: 2, pointRadius: 3 },
        { label: '收入', data: incData, borderColor: '#2ECC71', backgroundColor: 'rgba(46,204,113,.08)', fill: true, tension: .3, borderWidth: 2, pointRadius: 3 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 } } } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 } } },
        y: { beginAtZero: true, suggestedMax: 100, grid: { color: '#F0F0F0' }, ticks: { font: { size: 10 } } }
      }
    }
  });
}

function renderRankList(all, year, month) {
  let filtered;
  if (month >= 0) {
    const ym = `${year}-${String(month+1).padStart(2,'0')}`;
    filtered = all.filter(t => t.type === 'expense' && t.yearMonth === ym);
  } else {
    filtered = all.filter(t => t.type === 'expense' && t.date.startsWith(String(year)));
  }

  // Group by category
  const catMap = {};
  filtered.forEach(t => { catMap[t.category] = (catMap[t.category] || 0) + t.amount; });
  const sorted = Object.entries(catMap).sort((a, b) => b[1] - a[1]);
  const total = sorted.reduce((s, [, v]) => s + v, 0);

  const container = document.getElementById('rankList');
  if (!sorted.length) {
    container.innerHTML = '<div class="empty-state" style="padding:20px">暂无数据</div>';
    return;
  }

  container.innerHTML = sorted.map(([name, amount], i) => {
    const cat = findCat('expense', name);
    const pct = total ? (amount / total * 100).toFixed(1) : 0;
    return `<div class="rank-item">
      <span class="rank-num">${i + 1}</span>
      <span class="rank-icon" style="width:28px;height:28px;border-radius:6px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--primary)">${cat.name[0]}</span>
      <div class="rank-info">
        <div class="rank-name">${name}</div>
        <div class="rank-bar"><div class="rank-bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="rank-right">
        <div class="rank-amount">${amount.toFixed(2)}</div>
        <div class="rank-pct">${pct}%</div>
      </div>
    </div>`;
  }).join('');
}

async function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.transactions) throw new Error('无效的数据文件');
    await dbClear();
    for (const tx of data.transactions) await dbAdd(tx);
    if (data.expenseCategories) saveCats('expense', data.expenseCategories);
    if (data.incomeCategories) saveCats('income', data.incomeCategories);
    alert(`导入成功！共 ${data.transactions.length} 条记录`);
    renderTxList();
  } catch (err) {
    alert('导入失败：' + err.message);
  }
  e.target.value = '';
}

// ==================== OPFS 静默备份 ====================
const BACKUP_FILE = 'moneykeeper_backup.json';

async function backupToOPFS() {
  try {
    const all = await dbGetAll();
    const data = {
      version: 1,
      backupDate: new Date().toISOString(),
      transactions: all,
      expenseCategories: getCats('expense'),
      incomeCategories: getCats('income')
    };
    const root = await navigator.storage.getDirectory();
    const file = await root.getFileHandle(BACKUP_FILE, { create: true });
    const writable = await file.createWritable();
    await writable.write(JSON.stringify(data));
    await writable.close();
  } catch(e) { /* OPFS not available, silently skip */ }
}

async function restoreFromOPFS() {
  try {
    const root = await navigator.storage.getDirectory();
    const file = await root.getFileHandle(BACKUP_FILE);
    const f = await file.getFile();
    const text = await f.text();
    const data = JSON.parse(text);
    if (!data.transactions || !data.transactions.length) return false;
    for (const tx of data.transactions) await dbAdd(tx);
    if (data.expenseCategories) saveCats('expense', data.expenseCategories);
    if (data.incomeCategories) saveCats('income', data.incomeCategories);
    return true;
  } catch(e) { return false; }
}

async function saveImageToOPFS(txId, blob) {
  try {
    const root = await navigator.storage.getDirectory();
    const fh = await root.getFileHandle(`img_${txId}.jpg`, { create: true });
    const w = await fh.createWritable();
    await w.write(blob);
    await w.close();
  } catch(e) { /* OPFS not available */ }
}

async function getImageFromOPFS(txId) {
  const root = await navigator.storage.getDirectory();
  const fh = await root.getFileHandle(`img_${txId}.jpg`);
  const file = await fh.getFile();
  return URL.createObjectURL(file);
}

async function deleteImageFromOPFS(txId) {
  try {
    const root = await navigator.storage.getDirectory();
    await root.removeEntry(`img_${txId}.jpg`);
  } catch(e) { /* file may not exist */ }
}

function compressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const maxW = 800;
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(b => resolve(b), 'image/jpeg', 0.7);
    };
    img.src = URL.createObjectURL(file);
  });
}

function pickImage() {
  document.getElementById('fileImage').click();
}

async function handleImagePicked(e) {
  const file = e.target.files[0];
  if (!file) return;
  const blob = await compressImage(file);
  pendingImage = blob;
  const url = URL.createObjectURL(blob);
  document.getElementById('imgThumb').src = url;
  document.getElementById('imgPreview').style.display = 'flex';
  e.target.value = '';
}

function removeImage() {
  pendingImage = editingTxId ? 'REMOVED' : null;
  document.getElementById('imgThumb').src = '';
  document.getElementById('imgPreview').style.display = 'none';

async function viewImage(txId) {

    const url = await getImageFromOPFS(txId);

}

function closeImageViewer() {

}

// ==================== 支付宝CSV导入 ====================
const ALIPAY_CAT_MAP = {
  '餐饮美食': '餐饮',
  '水果': '水果',
  '交通出行': '出行', '公共交通': '出行',
  '住房物业': '住房',
  '通讯快递': '快递',
  '文化休闲': '娱乐', '运动户外': '娱乐',
  '教育培训': '学习',
  '日用百货': '日用', '生活服务': '日用', '便民服务': '日用',
  '医疗健康': '医疗',
  '服饰装扮': '服饰',
  '充值缴费': '通讯',
};

function mapAlipayCategory(alipayCat) {
  return ALIPAY_CAT_MAP[alipayCat] || '其他';
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"') { inQuotes = false; }
      else { current += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { result.push(current.trim()); current = ''; }
      else { current += ch; }
    }
  }
  result.push(current.trim());
  return result;
}

async function dbGetAllAlipayOrderNos() {
  const all = await dbGetAll();
  return new Set(all.map(t => t.alipayOrderNo).filter(Boolean));
}

function importAlipayCSV() {
  document.getElementById('fileAlipay').click();
}

async function handleAlipayCSV(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const lines = text.split('\n');
    let dataStart = 0;
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].startsWith('交易时间')) { dataStart = i + 1; break; }
    }
    if (!dataStart) throw new Error('未找到CSV表头，请确认是支付宝导出的账单文件');
    const existingNos = await dbGetAllAlipayOrderNos();
    const rows = [];
    let skipCount = 0, dupCount = 0;
    for (let i = dataStart; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      const cols = parseCSVLine(line);
      if (cols.length < 7) continue;
      const [time, alipayCat, , , desc, inout, amountStr, , status, orderNo] = cols;
      if (inout === '不计收支') { skipCount++; continue; }
      if (status === '交易关闭' || status === '退款成功') { skipCount++; continue; }
      const amount = parseFloat(amountStr);
      if (!amount || amount <= 0) { skipCount++; continue; }
      if (orderNo && existingNos.has(orderNo)) { dupCount++; continue; }
      const type = inout === '收入' ? 'income' : 'expense';
      rows.push({
	        id: orderNo ? ('alipay_' + orderNo) : (Date.now().toString(36) + Math.random().toString(36).slice(2, 6)),
        type,
        amount,
        category: mapAlipayCategory(alipayCat),
        note: desc.slice(0, 100),
	        date: time.substring(0, 10).replace(/\//g, '-'),
	        yearMonth: time.substring(0, 7).replace(/\//g, '-'),
        createdAt: Date.now(),
        alipayOrderNo: orderNo || '',
      });
    }
    pendingAlipayRows = rows;
    const expenseCount = rows.filter(r => r.type === 'expense').length;
    const incomeCount = rows.filter(r => r.type === 'income').length;
    document.getElementById('csvSummary').textContent = '共解析 ' + (lines.length - dataStart) + ' 条，可导入 ' + rows.length + ' 条';
    document.getElementById('csvStats').innerHTML = `
      <div class="csv-stat exp"><div class="num">${expenseCount}</div><div class="label">支出</div></div>
      <div class="csv-stat inc"><div class="num">${incomeCount}</div><div class="label">收入</div></div>
      <div class="csv-stat skip"><div class="num">${skipCount + dupCount}</div><div class="label">跳过</div></div>`;
    document.getElementById('csvModal').classList.add('open');
  } catch(err) {
    alert('导入失败：' + err.message + '\n请确认文件是支付宝导出的CSV账单，编码为UTF-8');
  }
  e.target.value = '';
}

async function doImportAlipay() {
  if (!pendingAlipayRows || !pendingAlipayRows.length) return;
  const rows = pendingAlipayRows;
  pendingAlipayRows = null;
  closeCsvModal();
  for (const tx of rows) {
    await dbAdd(tx);
  }
  backupToOPFS();
  alert(`成功导入 ${rows.length} 条记录`);
  renderTxList();
}

function closeCsvModal() {
  document.getElementById('csvModal').classList.remove('open');
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  const all = await dbGetAll();
  if (!all.length) {
    const restored = await restoreFromOPFS();
    if (restored) console.log('数据已从备份恢复');
  }
  renderTxList();
})();
